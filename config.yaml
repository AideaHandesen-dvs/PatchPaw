llm:
  provider: openai          # "ollama" or "openai"
  model: deepseek-chat
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY
  max_tokens: 4096
  temperature: 0.2

sandbox:
  docker_image: python:3.12-slim
  network_disabled: true
  timeout_seconds: 600
  memory_limit: 512m

repository:
  allowed_paths:
    - sum.sh
    - README.md
  denied_patterns:
    - "*.env"
    - ".env*"
    - "sessions/"
    - "**/.git/**"

session:
  storage_dir: sessions/
  max_history: 20
